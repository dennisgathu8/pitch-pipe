name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Clojure CLI
        run: |
          curl -L -O https://github.com/clojure/brew-install/releases/latest/download/linux-install.sh
          chmod +x linux-install.sh
          sudo ./linux-install.sh

      - name: Install Leiningen
        run: |
          mkdir -p ~/.local/bin
          curl https://raw.githubusercontent.com/technomancy/leiningen/stable/bin/lein -o ~/.local/bin/lein
          chmod +x ~/.local/bin/lein
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          ~/.local/bin/lein version

      - name: Cache Leiningen dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-lein-${{ hashFiles('project.clj') }}
          restore-keys: |
            ${{ runner.os }}-lein-

      - name: Cache Clojure CLI dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gitlibs
          key: ${{ runner.os }}-clj-${{ hashFiles('nvd/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-

      - name: Install clj-kondo
        run: |
          CLJ_KONDO_VERSION="2025.01.16"
          curl -sL "https://github.com/clj-kondo/clj-kondo/releases/download/v${CLJ_KONDO_VERSION}/clj-kondo-${CLJ_KONDO_VERSION}-linux-amd64.zip" \
            -o clj-kondo.zip
          unzip clj-kondo.zip
          sudo mv clj-kondo /usr/local/bin/
          clj-kondo --version

      - name: Lint
        run: clj-kondo --lint src test

      - name: Run tests
        env:
          STATSBOMB_DATA_PATH: ${{ github.workspace }}/test/resources
        run: lein test

      - name: Security scan
        working-directory: nvd
        env:
          NVD_API_TOKEN: ${{ secrets.NVD_API_TOKEN }}
        run: |
          clojure -J-Dclojure.main.report=stderr \
            -M -m nvd.task.check \
            "config.edn" \
            "$(cd .. && lein classpath)"
        continue-on-error: true
